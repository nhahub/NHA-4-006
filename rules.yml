groups:
  - name: url_shortener_alerts
    rules:
      # Alert: High rate of 404 errors
      - alert: High404ErrorRate
        expr: rate(failed_lookups_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 404 error rate detected"
          description: "The rate of failed lookups (404s) has exceeded 0.1 req/s for more than 2 minutes."

      # Alert: High average request latency
      - alert: HighRequestLatency
        expr: rate(request_latency_seconds_sum[5m]) / rate(request_latency_seconds_count[5m]) > 0.5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High average request latency"
          description: "The average request latency has exceeded 500ms for more than 2 minutes."
